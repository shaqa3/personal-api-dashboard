name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Boot app and smoke-test endpoints
        run: |
          python - <<'PY'
          from app.main import app
          from fastapi.testclient import TestClient

          with TestClient(app) as c:
              stats = c.get("/api/stats")
              assert stats.status_code == 200, stats.status_code
              sources = stats.json()["sources"]
              assert set(sources) == {"github", "spotify", "strava", "wakatime"}, sources

              assert c.get("/healthz").status_code == 200
              assert c.get("/openapi.json").status_code == 200

              widget = c.get("/static/now-playing.js")
              assert widget.status_code == 200, widget.status_code
          print("backend smoke test OK")
          PY

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t personal-api-dashboard-backend ./backend

      - name: Build frontend image
        run: docker build -t personal-api-dashboard-frontend ./frontend
